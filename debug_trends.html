<!DOCTYPE html>
<html>
<head>
    <title>Debug Trends</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
    <script src="volume_trends_data.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a1a; color: white; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #333; border-radius: 8px; }
        canvas { background: rgba(255,255,255,0.1); border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Debug Volume Trends</h1>
    
    <div class="test-section">
        <h2>1. Test Data Loading</h2>
        <button onclick="testDataLoading()">Test Data Loading</button>
        <div id="data-result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. Test Volume Chart</h2>
        <button onclick="testVolumeChart()">Draw Volume Chart</button>
        <canvas id="testVolumeChart" width="400" height="200"></canvas>
    </div>
    
    <div class="test-section">
        <h2>3. Test Price Chart</h2>
        <button onclick="testPriceChart()">Draw Price Chart</button>
        <canvas id="testPriceChart" width="400" height="200"></canvas>
    </div>

    <script>
        function testDataLoading() {
            const result = document.getElementById('data-result');
            
            // Test if VOLUME_TRENDS_DATA exists
            if (typeof VOLUME_TRENDS_DATA === 'undefined') {
                result.innerHTML = '❌ VOLUME_TRENDS_DATA not loaded';
                return;
            }
            
            // Test getVolumeTrends function
            if (typeof getVolumeTrends === 'undefined') {
                result.innerHTML = '❌ getVolumeTrends function not found';
                return;
            }
            
            // Test with Gachibowli
            const testData = getVolumeTrends('Gachibowli');
            if (testData) {
                result.innerHTML = `✅ Data loaded successfully!<br>
                    Location: ${testData.location_name}<br>
                    Cluster: ${testData.cluster}<br>
                    Years: ${testData.years.join(', ')}<br>
                    Volumes: ${testData.volumes.join(', ')}`;
            } else {
                result.innerHTML = '❌ No data found for Gachibowli';
            }
        }
        
        function testVolumeChart() {
            const canvas = document.getElementById('testVolumeChart');
            const ctx = canvas.getContext('2d');
            
            const testData = getVolumeTrends('Gachibowli');
            if (!testData) {
                alert('No data found for Gachibowli');
                return;
            }
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: testData.years,
                    datasets: [{
                        label: 'Volume',
                        data: testData.volumes,
                        borderColor: '#10B981',
                        backgroundColor: 'rgba(16, 185, 129, 0.2)',
                        borderWidth: 2,
                        fill: true
                    }]
                },
                options: {
                    responsive: false,
                    plugins: {
                        title: {
                            display: true,
                            text: `Volume Trends - ${testData.location_name}`
                        }
                    }
                }
            });
        }
        
        function testPriceChart() {
            const canvas = document.getElementById('testPriceChart');
            const ctx = canvas.getContext('2d');
            
            // Sample price data
            const priceData = {
                years: ['2018', '2019', '2020', '2021', '2022', '2023', '2024', '2025', '2026'],
                prices: [8000, 8500, 7800, 9200, 10500, 11200, 11800, 12500, 13200]
            };
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: priceData.years,
                    datasets: [{
                        label: 'Price/sqft',
                        data: priceData.prices,
                        borderColor: '#A68A3D',
                        backgroundColor: 'rgba(166, 138, 61, 0.2)',
                        borderWidth: 2,
                        fill: true
                    }]
                },
                options: {
                    responsive: false,
                    plugins: {
                        title: {
                            display: true,
                            text: 'Price Trends - Test Location'
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
