<!DOCTYPE html>
<html>
<head>
    <title>Test Property Detail</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .detail-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .detail-section-title { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; }
        .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .detail-field { padding: 5px; }
        .detail-field label { font-weight: bold; display: block; color: #666; }
        .detail-field span { display: block; margin-top: 3px; }
    </style>
</head>
<body>
    <h1>Testing Property Detail View</h1>
    <button onclick="testAPI()">Load Property from API</button>
    <div id="result"></div>
    
    <script>
        async function testAPI() {
            try {
                const response = await fetch('http://localhost:8000/api/v1/properties?area=Hitec City');
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const property = data[0];
                    const details = property.full_details;
                    
                    document.getElementById('result').innerHTML = `
                        <h2>Property: ${property.projectname}</h2>
                        <p>Builder: ${property.buildername}</p>
                        
                        <div class="detail-section">
                            <h3 class="detail-section-title">🏠 Basic Info</h3>
                            <div class="detail-grid">
                                <div class="detail-field">
                                    <label>Project Name</label>
                                    <span>${details.projectname || 'N/A'}</span>
                                </div>
                                <div class="detail-field">
                                    <label>Builder</label>
                                    <span>${details.buildername || 'N/A'}</span>
                                </div>
                                <div class="detail-field">
                                    <label>Type</label>
                                    <span>${details.project_type || 'N/A'}</span>
                                </div>
                                <div class="detail-field">
                                    <label>Community</label>
                                    <span>${details.communitytype || 'N/A'}</span>
                                </div>
                                <div class="detail-field">
                                    <label>Status</label>
                                    <span>${details.status || 'N/A'}</span>
                                </div>
                                <div class="detail-field">
                                    <label>Project Status</label>
                                    <span>${details.project_status || 'N/A'}</span>
                                </div>
                                <div class="detail-field">
                                    <label>Availability</label>
                                    <span>${details.isavailable || 'N/A'}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="detail-section">
                            <h3 class="detail-section-title">📍 Location</h3>
                            <div class="detail-grid">
                                <div class="detail-field">
                                    <label>Area</label>
                                    <span>${details.areaname || 'N/A'}</span>
                                </div>
                                <div class="detail-field">
                                    <label>Location</label>
                                    <span>${details.projectlocation || 'N/A'}</span>
                                </div>
                                <div class="detail-field">
                                    <label>Google Name</label>
                                    <span>${details.google_place_name || 'N/A'}</span>
                                </div>
                                <div class="detail-field">
                                    <label>Full Address</label>
                                    <span>${details.google_place_address || 'N/A'}</span>
                                </div>
                            </div>
                        </div>
                        
                        <h3>Full Details Object Keys (${Object.keys(details).length} total):</h3>
                        <pre>${Object.keys(details).join(', ')}</pre>
                    `;
                } else {
                    document.getElementById('result').innerHTML = '<p>No properties found</p>';
                }
            } catch (error) {
                document.getElementById('result').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
