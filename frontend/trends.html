<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Trends | Real Estate Intelligence</title>

    <!-- TAILWIND CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FONTS -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- APEXCHARTS -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    <!-- REACT & BABEL -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- LUCIDE ICONS -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ApexCharts Tooltip Customization */
        .apexcharts-tooltip {
            background: #1e293b !important;
            border-color: #334155 !important;
            color: #fff;
        }

        .apexcharts-tooltip-title {
            background: #0f172a !important;
            border-bottom: 1px solid #334155 !important;
            font-family: 'Inter', sans-serif !important;
        }

        .apexcharts-text {
            fill: #94a3b8 !important;
            /* Slate-400 */
        }

        /* Hide scrollbar for neatness */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        surface: '#1e293b',
                        primary: '#3b82f6',
                        accent: '#f43f5e'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="overflow-y-auto min-h-screen text-slate-200">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- API HELPERS ---
        const API_BASE = 'http://localhost:8000/api/v1';

        // --- COMPONENTS ---

        const Header = () => (
            <header className="fixed top-0 w-full h-16 glass-panel z-50 flex items-center justify-between px-6 border-b border-slate-700/50">
                <div className="flex items-center gap-4">
                    <a href="index.html" className="p-2 hover:bg-white/5 rounded-full transition-colors text-slate-400 hover:text-white">
                        <i data-lucide="arrow-left" className="w-5 h-5"></i>
                    </a>
                    <h1 className="font-display text-xl font-bold tracking-tight text-white">
                        Market<span className="text-primary">Pulse</span>
                    </h1>
                </div>
                <div className="flex items-center gap-6">
                    <div className="flex items-center gap-2 text-xs font-medium px-3 py-1.5 bg-emerald-500/10 text-emerald-400 rounded-full border border-emerald-500/20">
                        <span className="relative flex h-2 w-2">
                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                            <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                        </span>
                        Live Market Data
                    </div>
                </div>
            </header>
        );

        const StatCard = ({ label, value, trend, trendUp }) => (
            <div className="glass-panel rounded-xl p-5 flex flex-col gap-2 relative overflow-hidden group hover:border-slate-600 transition-colors">
                <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                    <i data-lucide="activity" className="w-12 h-12"></i>
                </div>
                <span className="text-xs font-medium text-slate-400 uppercase tracking-wider">{label}</span>
                <div className="flex items-end gap-3">
                    <span className="text-2xl font-bold text-white tracking-tight">{value}</span>
                    {trend && (
                        <span className={`text-xs font-semibold px-1.5 py-0.5 rounded ${trendUp ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'}`}>
                            {trendUp ? '↑' : '↓'} {trend}
                        </span>
                    )}
                </div>
            </div>
        );

        const ComparisonTable = ({ locations, onRemove }) => {
            if (!locations.length) return null;

            return (
                <div className="glass-panel rounded-xl overflow-hidden mt-6 animate-enter">
                    <div className="px-6 py-4 border-b border-slate-700/50 flex justify-between items-center">
                        <h3 className="font-display font-semibold text-slate-200">Performance Matrix</h3>
                        <button className="text-xs text-primary hover:text-blue-400 transition-colors">Export CSV</button>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-sm text-left">
                            <thead className="text-xs text-slate-400 uppercase bg-slate-800/50">
                                <tr>
                                    <th className="px-6 py-3 font-medium">Location</th>
                                    <th className="px-6 py-3 font-medium">Current Price</th>
                                    <th className="px-6 py-3 font-medium">1Y Change</th>
                                    <th className="px-6 py-3 font-medium">CAGR</th>
                                    <th className="px-6 py-3 font-medium">Actions</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-700/50">
                                {locations.map(loc => (
                                    <tr key={loc.id} className="hover:bg-white/5 transition-colors">
                                        <td className="px-6 py-4 font-medium text-white flex items-center gap-2">
                                            <span className="w-2 h-2 rounded-full" style={{ backgroundColor: loc.color }}></span>
                                            {loc.isBaseline ? (
                                                <span className="font-bold text-yellow-500">{loc.name} (Baseline)</span>
                                            ) : loc.name}
                                        </td>
                                        <td className="px-6 py-4 text-slate-300">₹{loc.currentPrice?.toLocaleString()}</td>
                                        <td className={`px-6 py-4 font-medium ${loc.yoy > 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                            {loc.yoy > 0 ? '+' : ''}{loc.yoy}%
                                        </td>
                                        <td className="px-6 py-4 text-slate-300">{loc.cagr}%</td>
                                        <td className="px-6 py-4">
                                            {!loc.isBaseline && (
                                                <button
                                                    onClick={() => onRemove(loc.id)}
                                                    className="p-1 hover:bg-slate-700 rounded text-slate-400 hover:text-rose-400 transition-colors"
                                                >
                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                </button>
                                            )}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const ChartSection = ({ series, categories }) => {
            const chartRef = useRef(null);

            useEffect(() => {
                if (!series.length || !document.querySelector("#chart")) return;

                // Safety check: ensure all series data match categories length
                // If filtering happened, we might have mismatches if not careful
                // ApexCharts handles nulls cleanly

                const options = {
                    series: series,
                    chart: {
                        type: 'line',
                        height: 380,
                        background: 'transparent',
                        toolbar: { show: false },
                        animations: { enabled: true, easing: 'easeinout', speed: 800 }
                    },
                    colors: series.map(s => s.color),
                    // Make baseline dashed
                    stroke: {
                        curve: 'smooth',
                        width: series.map(s => s.isBaseline ? 3 : 2),
                        dashArray: series.map(s => s.isBaseline ? 5 : 0)
                    },
                    dataLabels: { enabled: false },
                    xaxis: {
                        categories: categories,
                        axisBorder: { show: false },
                        axisTicks: { show: false },
                        labels: {
                            style: { colors: '#94a3b8', fontSize: '11px', fontFamily: 'Inter' },
                            // Format Q1'24
                            formatter: function (val) {
                                if (!val) return val;
                                // expect format "2024Q1"
                                const match = val.match(/(\d{4})Q(\d)/);
                                if (match) {
                                    return `Q${match[2]} '${match[1].slice(2)}`;
                                }
                                return val;
                            }
                        },
                        tooltip: { enabled: false }
                    },
                    yaxis: {
                        labels: {
                            style: { colors: '#94a3b8', fontSize: '11px', fontFamily: 'Inter' },
                            formatter: (val) => `₹${(val / 1000).toFixed(1)}k`
                        }
                    },
                    grid: {
                        borderColor: '#334155',
                        strokeDashArray: 4,
                        xaxis: { lines: { show: false } },
                        yaxis: { lines: { show: true } }
                    },
                    theme: { mode: 'dark' },
                    tooltip: {
                        theme: 'dark',
                        y: { formatter: (val) => `₹${val.toLocaleString()}` },
                        style: { fontSize: '12px', fontFamily: 'Inter' },
                        marker: { show: true },
                    },
                    legend: { show: false }
                };

                // Cleanup previous chart
                if (chartRef.current) {
                    chartRef.current.destroy();
                }

                chartRef.current = new ApexCharts(document.querySelector("#chart"), options);
                chartRef.current.render();

                return () => {
                    if (chartRef.current) chartRef.current.destroy();
                };
            }, [series, categories]);

            return <div id="chart" className="w-full h-[380px]"></div>;
        };

        // --- MAIN APP ---

        const Dashboard = () => {
            const [allLocations, setAllLocations] = useState([]);
            const [selectedIds, setSelectedIds] = useState([249]); // Baseline
            const [rawData, setRawData] = useState([]); // Store fetched JSONs
            const [loading, setLoading] = useState(false);
            const [timeRange, setTimeRange] = useState('3Y'); // Default to 3 Years

            // Load logic
            useEffect(() => {
                // 1. Get List
                fetch(`${API_BASE}/insights`)
                    .then(res => res.json())
                    .then(data => {
                        const sorted = data.sort((a, b) => a.location.localeCompare(b.location));
                        setAllLocations(sorted);
                    });

                // 2. Initial Fetch (Baseline)
                fetchLocationData([249]);
            }, []);

            const fetchLocationData = async (ids) => {
                setLoading(true);
                try {
                    // Only fetch what we don't have? 
                    // For simplicity, just refetch all in filtered set or minimal diff
                    // Actually, let's just fetch all selectedIds for robustness
                    const promises = ids.map(id => fetch(`${API_BASE}/location/${id}/trends`).then(res =>
                        res.ok ? res.json() : null
                    ));

                    const results = await Promise.all(promises);
                    const validResults = results.filter(r => r && r.trends && r.trends.length > 0);
                    setRawData(validResults);
                } catch (err) {
                    console.error("Fetch error", err);
                } finally {
                    setLoading(false);
                }
            };

            // Derive Chart Data based on RawData + TimeRange
            const { chartSeries, chartCategories } = useMemo(() => {
                if (!rawData.length) return { chartSeries: [], chartCategories: [] };

                // 1. Gather all unique periods
                let allPeriods = Array.from(new Set(rawData.flatMap(r => r.trends.map(t => t.period)))).sort();

                // STRICT FILTER: Only 2021 to 2026
                allPeriods = allPeriods.filter(p => {
                    const year = parseInt(p.substring(0, 4));
                    return year >= 2021 && year <= 2026;
                });

                // 2. Filter Periods based on TimeRange
                // Periods are strings "YYYYQQ", e.g. "2024Q1"
                // 1Y = 4 quarters, 3Y = 12, 5Y = 20
                if (timeRange !== 'All') {
                    const count = timeRange === '1Y' ? 4 : timeRange === '3Y' ? 12 : 20;
                    allPeriods = allPeriods.slice(-count);
                }

                // 3. Map Series
                const palette = ['#eab308', '#3b82f6', '#10b981', '#f43f5e', '#8b5cf6', '#ec4899']; // Baseline yellow first

                const series = rawData.map((loc, idx) => {
                    // Check if baseline
                    const isBaseline = loc.location_id === 249 || loc.location.includes("Average");

                    // Assign color (baseline always yellow/0 index logic handled below)
                    // We need a stable color assignment based on ID or index
                    // Let's just iterate.

                    const dataPoints = allPeriods.map(p => {
                        const pt = loc.trends.find(t => t.period === p);
                        return pt ? pt.price : null;
                    });

                    // Last valid price for table metrics
                    const lastPrice = loc.trends.filter(t => t.price).pop()?.price || 0;

                    return {
                        name: loc.location,
                        data: dataPoints,
                        isBaseline: isBaseline,
                        id: loc.location_id,
                        currentPrice: lastPrice,
                        yoy: loc.growth_yoy,
                        cagr: loc.cagr,
                        stability: 85,
                        // Color assignment: Baseline yellow, others rotate
                        color: isBaseline ? '#eab308' : palette[(idx % (palette.length - 1)) + 1]
                    };
                });

                // Sort: Baseline first
                series.sort((a, b) => b.isBaseline - a.isBaseline);

                return { chartSeries: series, chartCategories: allPeriods };

            }, [rawData, timeRange]);


            const handleAddLocation = (e) => {
                const id = parseInt(e.target.value);
                if (!id || selectedIds.includes(id)) return;

                if (selectedIds.length >= 6) {
                    alert("Max comparisons reached");
                    return;
                }

                const newIds = [...selectedIds, id];
                setSelectedIds(newIds);
                fetchLocationData(newIds);
                // Reset select
                e.target.value = "";
            };

            const handleRemoveLocation = (id) => {
                if (id === 249) return; // Prevent baseline remove
                const newIds = selectedIds.filter(x => x !== id);
                setSelectedIds(newIds);
                fetchLocationData(newIds);
            };

            return (
                <div className="min-h-screen bg-dark pt-20 pb-12 px-8">
                    <Header />

                    <div className="max-w-7xl mx-auto grid grid-cols-12 gap-8">

                        {/* LEFT: CONTROLS */}
                        <div className="col-span-12 lg:col-span-3 space-y-6">

                            {/* Selector */}
                            <div className="glass-panel p-5 rounded-xl">
                                <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3 block">
                                    Compare Locations
                                </label>
                                <div className="relative">
                                    <select
                                        onChange={handleAddLocation}
                                        className="w-full bg-slate-800/50 border border-slate-600 rounded-lg py-2.5 px-3 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/50 appearance-none cursor-pointer"
                                    >
                                        <option value="">Search or Select...</option>
                                        {allLocations.map(loc => (
                                            <option key={loc.location_id} value={loc.location_id}>
                                                {loc.location}
                                            </option>
                                        ))}
                                    </select>
                                    <i data-lucide="chevron-down" className="absolute right-3 top-3 w-4 h-4 text-slate-400 pointer-events-none"></i>
                                </div>

                                {/* Active Pills */}
                                <div className="mt-4 flex flex-col gap-2">
                                    {chartSeries.map(s => (
                                        <div key={s.id}
                                            className={`flex items-center justify-between pl-3 pr-2 py-2 rounded-lg border text-sm transition-all ${s.isBaseline ? 'bg-yellow-500/10 border-yellow-500/30 text-yellow-500' : 'bg-slate-800/50 border-slate-700 text-slate-300'}`}>
                                            <div className="flex items-center gap-2">
                                                <span className="w-2.5 h-2.5 rounded-full" style={{ background: s.color }}></span>
                                                <span className="font-medium truncate max-w-[140px]">{s.name}</span>
                                            </div>
                                            {!s.isBaseline && (
                                                <button
                                                    onClick={() => handleRemoveLocation(s.id)}
                                                    className="p-1 hover:text-white hover:bg-white/10 rounded transition-colors"
                                                >
                                                    <i data-lucide="x" className="w-3.5 h-3.5"></i>
                                                </button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Stats */}
                            <StatCard
                                label="Market Average"
                                value={`₹${((chartSeries.find(s => s.isBaseline)?.currentPrice || 0) / 1000).toFixed(1)}k`}
                                trend="8.4%"
                                trendUp={true}
                            />
                        </div>

                        {/* RIGHT: CHART */}
                        <div className="col-span-12 lg:col-span-9 space-y-6">
                            <div className="glass-panel p-6 rounded-xl relative min-h-[400px]">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                                    <div>
                                        <h2 className="text-lg font-display font-semibold text-white">Price Trends Analysis</h2>
                                        <p className="text-sm text-slate-400 mt-1">Comparing market values over time</p>
                                    </div>

                                    {/* TIME RANGE CONTROLS */}
                                    <div className="flex bg-slate-800/80 p-1 rounded-lg border border-slate-700">
                                        {['1Y', '3Y', '5Y', 'All'].map(range => (
                                            <button
                                                key={range}
                                                onClick={() => setTimeRange(range)}
                                                className={`px-4 py-1.5 text-xs font-medium rounded-md transition-all ${timeRange === range
                                                    ? 'bg-slate-600 text-white shadow-sm'
                                                    : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/50'
                                                    }`}
                                            >
                                                {range}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {loading ? (
                                    <div className="absolute inset-0 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm z-10">
                                        <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
                                    </div>
                                ) : (
                                    <ChartSection series={chartSeries} categories={chartCategories} />
                                )}
                            </div>

                            <ComparisonTable locations={chartSeries} onRemove={handleRemoveLocation} />
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);

        // Icon Fix
        setInterval(() => lucide.createIcons(), 500); 
    </script>
</body>

</html>
