<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IntelliWeb — Hyderabad Elite</title>
  <meta name="description"
    content="Exclusive real estate intelligence for Hyderabad — property analytics, market trends, and location insights." />

  <!-- MapLibre -->
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <script src="pmtiles.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- API Configuration -->
  <script src="config.js"></script>
  
  <!-- Volume Trends Data -->
  <script src="volume_trends_data.js"></script>

  <link rel="stylesheet" href="style.css?v=6.0" />
</head>

<body>

  <!-- ═══════════════════════════════════════════
       LEFT SIDEBAR
  ═══════════════════════════════════════════ -->
  <aside id="sidebar">

    <!-- Brand -->
    <div id="sidebar-brand">
      <div class="brand-block">
        <div class="brand-name">Relai<em>Analytics</em></div>
        <div class="brand-sub">Hyderabad Elite</div>
      </div>
      <div class="live-badge">
        <span class="pulse-dot"></span> Live
      </div>
    </div>

    <!-- Search -->
    <div class="search-container">
      <input type="text" id="location-search" placeholder="Search elite locations…" autocomplete="off"
        spellcheck="false" />
      <div id="search-results"></div>
    </div>

    <!-- Intel Card — fills remaining sidebar space -->
    <div id="intel-card">
      <div id="empty-state">
        <div class="empty-icon-wrap">
          <img src="images/logo.png" alt="Logo" class="empty-logo" />
        </div>
        <h3>Intelligence Awaits</h3>
        <p>Select any location pin on the map or type an active locality above to access exclusive property analytics.
        </p>
      </div>
    </div>

  </aside>

  <!-- ═══════════════════════════════════════════
       MAP (fills right side)
  ═══════════════════════════════════════════ -->
  <div id="map"></div>

  <!-- ═══════════════════════════════════════════
       LAYER BAR — horizontal, bottom center
  ═══════════════════════════════════════════ -->
  <div class="layer-controls">

    <label class="layer-toggle">
      <input type="checkbox" id="highways" data-layer="highways-layer" />
      <div class="layer-card">
        <img src="assets/highway.png" alt="Highways" />
        <span>Highways</span>
      </div>
    </label>

    <label class="layer-toggle">
      <input type="checkbox" id="metro" data-layer="metro-layer" />
      <div class="layer-card">
        <img src="assets/metro.png" alt="Metro" />
        <span>Metro</span>
      </div>
    </label>

    <label class="layer-toggle">
      <input type="checkbox" id="orr" data-layer="orr-layer" />
      <div class="layer-card">
        <img src="assets/orr.png" alt="ORR" />
        <span>ORR</span>
      </div>
    </label>

    <label class="layer-toggle">
      <input type="checkbox" id="lakes" data-layer="lakes-layer" />
      <div class="layer-card">
        <img src="assets/lakes.png" alt="Lakes" />
        <span>Lakes</span>
      </div>
    </label>

    <label class="layer-toggle">
      <input type="checkbox" id="rrr" data-layer="rrr-layer" />
      <div class="layer-card">
        <img src="assets/rrr.png" alt="RRR" />
        <span>RRR</span>
      </div>
    </label>

    <label class="layer-toggle">
      <input type="checkbox" id="hmda" data-layer="hmda-layer" />
      <div class="layer-card">
        <img src="assets/HMDA.png" alt="HMDA" />
        <span>HMDA</span>
      </div>
    </label>

    <label class="layer-toggle">
      <input type="checkbox" id="flood" data-layer="flood-risk-layer" />
      <div class="layer-card">
        <img src="assets/floods.png" alt="Floods" />
        <span>Floods</span>
      </div>
    </label>

  </div>

  <!-- ═══════════════════════════════════════════
       AMENITIES RIGHT PANEL
  ═══════════════════════════════════════════ -->
  <div id="amenities-list-card">
    <div class="amenity-header">
      <h4 id="amenity-title">Nearby Amenities</h4>
      <button id="close-amenities">✕</button>
    </div>
    <div id="amenities-list-content"></div>
  </div>


  <!-- ═══════════════════════════════════════════
       PROPERTIES LIST PANEL (Right Side)
  ═══════════════════════════════════════════ -->
  <div id="properties-panel">
    <div class="prop-panel-header">
      <div class="prop-panel-title-row">
        <span class="prop-panel-icon">🏢</span>
        <div>
          <h4 id="prop-panel-title">Properties</h4>
          <span id="prop-panel-count" class="prop-panel-count">0 projects</span>
        </div>
      </div>
      <button id="close-properties-panel" class="prop-panel-close">✕</button>
    </div>
    
    <div id="prop-panel-body">
      <div class="prop-loading" id="prop-loading">
        <div class="prop-spinner"></div>
        <span>Loading properties…</span>
      </div>
      <div id="prop-list"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       PROPERTY DETAIL DRAWER
  ═══════════════════════════════════════════ -->
  <div id="property-detail-drawer">
    <div class="detail-header">
      <button class="detail-back-btn" id="detail-back-btn">← Back</button>
      <button class="detail-close-btn" id="detail-close-btn">✕</button>
    </div>

    <!-- Gallery -->
    <div class="detail-gallery" id="detail-gallery"></div>

    <!-- Hero -->
    <div class="detail-hero">
      <div class="detail-badges" id="detail-badges"></div>
      <h2 class="detail-proj-name" id="detail-proj-name"></h2>
      <p class="detail-builder" id="detail-builder"></p>
      <div class="detail-key-stats" id="detail-key-stats"></div>
    </div>

    <!-- Sections populated by JS -->
    <div class="detail-sections" id="detail-sections"></div>
  </div>

  <script src="app.js?v=5.0"></script>
</body>

</html>
