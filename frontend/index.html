<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>West Hyderabad Intelligence</title>

  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="pmtiles.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body>


  <!-- HEADER -->
  <div id="app-header">
    <div id="app-title">
      West Hyderabad Intelligence
    </div>

    <div class="header-actions">

      <div id="layers-btn">
        <img class="layericon" src="assets/layers.png" alt="Layers" />
      </div>
    </div>
  </div>

  <!-- ============================
       LAYERS CARD (UPDATED HTML)
  ============================= -->
  <div id="layers-card" class="layers-sheet">
    <div class="layers-header">
      <span>Layers</span>
      <button id="close-layers">✕</button>
    </div>



    <!-- Layers grid -->
    <div class="layers-grid">

      <label class="layer-tile">
        <input type="checkbox" data-layer="schools-layer" />
        <img src="assets/school.png" alt="Schools" />
        <span>Schools</span>
      </label>

      <label class="layer-tile">
        <input type="checkbox" data-layer="highways-layer" />
        <img src="assets/highway.png" alt="Highways" />
        <span>Highways</span>
      </label>

      <label class="layer-tile">
        <input type="checkbox" data-layer="metro-layer" />
        <img src="assets/metro.png" alt="Metro Lines" />
        <span>Metro Lines</span>
      </label>

      <label class="layer-tile">
        <input type="checkbox" data-layer="orr-layer" />
        <img src="assets/orr.png" alt="Outer Ring Road" />
        <span>Outer Ring Road</span>
      </label>


      <label class="layer-tile">
        <input type="checkbox" data-layer="lakes-layer" />
        <img src="assets/lakes.png" alt="Lakes" />
        <span>Lakes</span>
      </label>

    </div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- INFO CARD -->
  <div id="intel-card"></div>

  <!-- LIBS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>

</html>
