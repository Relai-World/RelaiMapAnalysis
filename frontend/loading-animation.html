<style>
/* ===============================
   LOADING SPLASH SCREEN
=============================== */
.loading-splash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  animation: fadeIn 0.3s ease;
}

.loading-splash.fade-out {
  animation: fadeOut 0.5s ease forwards;
}

.loading-content {
  text-align: center;
  color: white;
}

/* Logo/Brand */
.loading-logo {
  margin-bottom: 40px;
}

.brand-text {
  font-size: 48px;
  font-weight: 700;
  margin: 0;
  color: white;
  letter-spacing: 2px;
}

.brand-italic {
  font-style: italic;
  font-weight: 300;
}

.brand-tagline {
  font-size: 14px;
  letter-spacing: 4px;
  margin: 10px 0 0 0;
  opacity: 0.9;
  font-weight: 600;
}

/* Animation Container */
.loading-animation {
  position: relative;
  width: 150px;
  height: 150px;
  margin: 0 auto 40px;
}

/* Pulsing Circle */
.pulse-circle {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 120px;
  height: 120px;
  border: 3px solid rgba(255, 255, 255, 0.3);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
  50% {
    transform: translate(-50%, -50%) scale(1.2);
    opacity: 0.5;
  }
}

/* Buildings Animation */
.buildings-container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.building {
  width: 20px;
  background: white;
  border-radius: 2px 2px 0 0;
  animation: buildingGrow 1.5s ease-in-out infinite;
}

.building-1 {
  height: 40px;
  animation-delay: 0s;
}

.building-2 {
  height: 55px;
  animation-delay: 0.2s;
}

.building-3 {
  height: 45px;
  animation-delay: 0.4s;
}

@keyframes buildingGrow {
  0%, 100% {
    transform: scaleY(1);
    opacity: 1;
  }
  50% {
    transform: scaleY(0.6);
    opacity: 0.7;
  }
}

/* Loading Text */
.loading-text {
  margin-bottom: 30px;
}

.loading-message {
  font-size: 18px;
  font-weight: 500;
  margin: 0 0 15px 0;
  letter-spacing: 1px;
}

.loading-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
}

.dot {
  width: 8px;
  height: 8px;
  background: white;
  border-radius: 50%;
  animation: dotBounce 1.4s ease-in-out infinite;
}

.dot:nth-child(1) {
  animation-delay: 0s;
}

.dot:nth-child(2) {
  animation-delay: 0.2s;
}

.dot:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes dotBounce {
  0%, 80%, 100% {
    transform: scale(0.8);
    opacity: 0.5;
  }
  40% {
    transform: scale(1.2);
    opacity: 1;
  }
}

/* Progress Bar */
.progress-container {
  width: 300px;
  height: 4px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 2px;
  overflow: hidden;
  margin: 0 auto;
}

.progress-bar {
  height: 100%;
  background: white;
  border-radius: 2px;
  animation: progress 3s ease-out forwards;
}

@keyframes progress {
  0% {
    width: 0%;
  }
  100% {
    width: 100%;
  }
}

/* Fade Animations */
@keyframes fadeIn {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

@keyframes fadeOut {
  from {
    opacity: 1;
  }
  to {
    opacity: 0;
  }
}

/* Mobile Responsive */
@media (max-width: 768px) {
  .brand-text {
    font-size: 36px;
  }
  
  .loading-animation {
    width: 120px;
    height: 120px;
  }
  
  .progress-container {
    width: 250px;
  }
}
</style>

<script>
// Loading Splash Screen Controller
(function() {
  // Minimum display time (3 seconds)
  const MIN_DISPLAY_TIME = 3000;
  const startTime = Date.now();
  
  // Hide splash screen when everything is loaded
  function hideSplash() {
    const elapsedTime = Date.now() - startTime;
    const remainingTime = Math.max(0, MIN_DISPLAY_TIME - elapsedTime);
    
    setTimeout(() => {
      const splash = document.getElementById('loading-splash');
      if (splash) {
        splash.classList.add('fade-out');
        setTimeout(() => {
          splash.remove();
        }, 500);
      }
    }, remainingTime);
  }
  
  // Wait for map and resources to load
  window.addEventListener('load', () => {
    // Check if map is loaded
    if (typeof map !== 'undefined' && map.loaded()) {
      hideSplash();
    } else if (typeof map !== 'undefined') {
      map.on('load', hideSplash);
    } else {
      // Fallback: hide after minimum time
      hideSplash();
    }
  });
  
  // Fallback: hide after 5 seconds maximum
  setTimeout(hideSplash, 5000);
})();
</script>
