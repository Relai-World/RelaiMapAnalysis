<!DOCTYPE html>
<html>
<head>
    <title>Debug Frontend Future Development Flow</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Debug Frontend Future Development Flow</h1>
    
    <div id="test-results"></div>
    
    <!-- Include the config.js -->
    <script src="frontend/config.js"></script>
    
    <script>
        async function debugFrontendFlow() {
            const resultsDiv = document.getElementById('test-results');
            let html = '';
            
            // Test 1: Check API Configuration
            html += '<div class="test-section info">';
            html += '<h3>Test 1: API Configuration</h3>';
            html += `<p><strong>API Base URL:</strong> ${window.API_BASE_URL}</p>`;
            html += `<p><strong>Current Hostname:</strong> ${window.location.hostname}</p>`;
            html += `<p><strong>Is Localhost:</strong> ${window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"}</p>`;
            html += '</div>';
            
            // Test 2: Simulate getting location data (like the frontend does)
            html += '<div class="test-section info">';
            html += '<h3>Test 2: Simulating Location Data Fetch</h3>';
            html += '<p>Simulating how frontend gets location data from insights...</p>';
            
            try {
                const insightsResponse = await fetch(`${window.API_BASE_URL}/api/v1/insights`);
                const insightsData = await insightsResponse.json();
                
                // Find Gachibowli like the frontend does
                const gachibowli = insightsData.find(d => d.location.toLowerCase().includes('gachibowli'));
                
                if (gachibowli) {
                    html += `<p class="success">✅ Found Gachibowli in insights data:</p>`;
                    html += `<pre>${JSON.stringify(gachibowli, null, 2)}</pre>`;
                    
                    // Test 3: Simulate the exact API call the frontend makes
                    html += '</div><div class="test-section info">';
                    html += '<h3>Test 3: Simulating Frontend API Call</h3>';
                    
                    const locationId = gachibowli.location_id;
                    const locationName = gachibowli.location;
                    
                    // This is the exact same call the frontend makes
                    const PYTHON_API_URL = window.API_BASE_URL;
                    const futureDevUrl = `${PYTHON_API_URL}/api/v1/future-development/${locationId}`;
                    
                    html += `<p><strong>Location ID:</strong> ${locationId}</p>`;
                    html += `<p><strong>Location Name:</strong> ${locationName}</p>`;
                    html += `<p><strong>API URL:</strong> ${futureDevUrl}</p>`;
                    
                    try {
                        const futureDevResponse = await fetch(futureDevUrl);
                        const futureDevData = await futureDevResponse.json();
                        
                        html += `<p class="success">✅ API Response Status: ${futureDevResponse.status}</p>`;
                        html += `<p><strong>Success:</strong> ${futureDevData.success}</p>`;
                        html += `<p><strong>Total Count:</strong> ${futureDevData.total_count}</p>`;
                        html += `<p><strong>Developments:</strong> ${futureDevData.developments ? futureDevData.developments.length : 0}</p>`;
                        
                        // Test 4: Simulate the frontend logic
                        html += '</div><div class="test-section info">';
                        html += '<h3>Test 4: Simulating Frontend Logic</h3>';
                        
                        if (!futureDevData.success || !futureDevData.developments || futureDevData.developments.length === 0) {
                            html += '<p class="error">❌ Frontend would show: "No future development data available"</p>';
                        } else {
                            html += '<p class="success">✅ Frontend would show development data successfully</p>';
                            html += `<p>Sample development:</p>`;
                            html += `<pre>${JSON.stringify(futureDevData.developments[0], null, 2)}</pre>`;
                        }
                        
                    } catch (fetchError) {
                        html += `<p class="error">❌ Future Development API Error: ${fetchError.message}</p>`;
                        html += '<p>This would trigger the "Sorry, I encountered an error" message</p>';
                    }
                    
                } else {
                    html += '<p class="error">❌ Gachibowli not found in insights data</p>';
                }
                
            } catch (insightsError) {
                html += `<p class="error">❌ Insights API Error: ${insightsError.message}</p>`;
            }
            
            html += '</div>';
            
            // Test 5: Check for CORS issues
            html += '<div class="test-section info">';
            html += '<h3>Test 5: CORS and Network Analysis</h3>';
            html += '<p>Open browser DevTools Network tab to check for:</p>';
            html += '<ul>';
            html += '<li>CORS errors (Access-Control-Allow-Origin)</li>';
            html += '<li>Network timeouts</li>';
            html += '<li>HTTP status codes</li>';
            html += '<li>Response content</li>';
            html += '</ul>';
            html += '</div>';
            
            resultsDiv.innerHTML = html;
        }
        
        // Run the debug flow when page loads
        window.onload = debugFrontendFlow;
    </script>
</body>
</html>
